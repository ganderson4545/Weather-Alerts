name: Weather Alert Monitor

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check NWS and post to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import sys

          STATE     = "NE"          # state code
          COUNTY    = "Saunders"    # county name, no "County" suffix
          MIN_SEV   = "Minor"    # Minor | Moderate | Severe | Extreme
          GIST_ID   = "533e0890678548f871092c69a69a71b6"
          GIST_FILE = "seen_alerts.txt"

          WEBHOOK    = os.environ.get("SLACK_WEBHOOK", "")
          GIST_TOKEN = os.environ.get("GIST_TOKEN", "")
          SEV_RANK   = {"Minor": 1, "Moderate": 2, "Severe": 3, "Extreme": 4}
          EMOJI      = {"Extreme": "🚨", "Severe": "⚠️", "Moderate": "🔶", "Minor": "🔷"}

          if not WEBHOOK:
              print("ERROR: SLACK_WEBHOOK secret not set.")
              sys.exit(1)
          if not GIST_TOKEN:
              print("ERROR: GIST_TOKEN secret not set.")
              sys.exit(1)

          def gist_headers():
              return {
                  "Authorization": f"token {GIST_TOKEN}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "WeatherAlertBot/1.0"
              }

          def load_seen():
              req = urllib.request.Request(
                  f"https://api.github.com/gists/{GIST_ID}",
                  headers=gist_headers()
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
              content = data["files"][GIST_FILE]["content"]
              ids = set(line.strip() for line in content.splitlines() if line.strip() and line.strip() != "init")
              return ids

          def save_seen(ids):
              body = json.dumps({
                  "files": {
                      GIST_FILE: {
                          "content": "\n".join(sorted(ids)) if ids else "init"
                      }
                  }
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/gists/{GIST_ID}",
                  data=body,
                  headers=gist_headers(),
                  method="PATCH"
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  r.read()

          try:
              seen = load_seen()
          except Exception as e:
              print(f"Gist load error: {e}")
              sys.exit(1)

          url = f"https://api.weather.gov/alerts/active?area={STATE}"
          req = urllib.request.Request(url, headers={"User-Agent": "WeatherAlertBot/1.0"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
          except Exception as e:
              print(f"NWS fetch error: {e}")
              sys.exit(1)

          alerts = data.get("features", [])
          county_lower = COUNTY.lower()
          min_rank = SEV_RANK.get(MIN_SEV, 1)

          new_seen = set(seen)
          posted = 0

          for alert in alerts:
              p = alert.get("properties", {})
              area = p.get("areaDesc", "").lower()
              if county_lower not in area:
                  continue
              sev = p.get("severity", "Minor")
              if SEV_RANK.get(sev, 1) < min_rank:
                  continue
              aid = alert.get("id", "")
              if aid in seen:
                  continue

              event     = p.get("event", "Weather Alert")
              emoji     = EMOJI.get(sev, "📢")
              onset     = p.get("onset", "N/A")
              expires   = p.get("expires", "N/A")
              headline  = p.get("headline", "No headline available.")
              area_desc = p.get("areaDesc", "N/A")

              payload = {
                  "blocks": [
                      {"type": "header", "text": {"type": "plain_text", "text": f"{emoji} {event}", "emoji": True}},
                      {"type": "section", "fields": [
                          {"type": "mrkdwn", "text": f"*Area:*\n{area_desc}"},
                          {"type": "mrkdwn", "text": f"*Severity:*\n{sev}"},
                          {"type": "mrkdwn", "text": f"*Onset:*\n{onset}"},
                          {"type": "mrkdwn", "text": f"*Expires:*\n{expires}"}
                      ]},
                      {"type": "section", "text": {"type": "mrkdwn", "text": f"*Headline:*\n{headline}"}},
                      {"type": "context", "elements": [{"type": "mrkdwn", "text": f"Source: National Weather Service · {aid.split('/')[-1]}"}]}
                  ]
              }

              body = json.dumps(payload).encode()
              post_req = urllib.request.Request(WEBHOOK, data=body, headers={"Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(post_req, timeout=10) as r:
                      r.read()
                  print(f"Posted: {event} ({sev}) for {area_desc}")
                  new_seen.add(aid)
                  posted += 1
              except Exception as e:
                  print(f"Slack post error: {e}")

          try:
              save_seen(new_seen)
          except Exception as e:
              print(f"Gist save error: {e}")

          print(f"Done. {len(alerts)} total alerts, {posted} new posted.")
          PYEOF
